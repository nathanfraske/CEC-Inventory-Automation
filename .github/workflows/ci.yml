name: ci
on:
  push:
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        # Fails the build if any secret is committed, including a stray .env.
        # GITHUB_TOKEN is required for gitleaks-action@v2 to scan pull_request events.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rust:
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: "true"   # build without a live DB; uses the committed .sqlx cache
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --workspace

  # Runs the integration suite against a real Postgres so every query is validated against
  # the live schema on each push. The app applies migrations/ on startup via sqlx::migrate!.
  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cec
          POSTGRES_PASSWORD: cec
          POSTGRES_DB: cec_inventory
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cec -d cec_inventory"
          --health-interval 5s --health-timeout 3s --health-retries 12
    env:
      DATABASE_URL: postgres://cec:cec@localhost:5432/cec_inventory
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace
