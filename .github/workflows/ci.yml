name: ci
on:
  push:
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v3
        # Fails the build if any secret is committed, including a stray .env.
        # GITHUB_TOKEN is required for gitleaks-action@v2 to scan pull_request events.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rust:
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: "true"   # build without a live DB; uses the committed .sqlx cache
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --workspace

  # Runs the integration suite against a real Postgres so every query is validated against
  # the live schema on each push. The app applies migrations/ on startup via sqlx::migrate!.
  tests:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: cec
          POSTGRES_PASSWORD: cec
          POSTGRES_DB: cec_inventory
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cec -d cec_inventory"
          --health-interval 5s --health-timeout 3s --health-retries 12
    env:
      DATABASE_URL: postgres://cec:cec@localhost:5432/cec_inventory
      # build_state() now requires SESSION_SECRET (≥64 bytes) and fails closed — supply a
      # throwaway CI value (not a real secret; the auth test only needs a valid signing key).
      SESSION_SECRET: ci-only-throwaway-session-secret-not-used-in-production-0123456789
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace

  # Brings the whole stack up with `docker compose` exactly as a real box would, waits for
  # every healthcheck to pass, and smoke-tests the integration seams: the API /readyz (which
  # proves it connected to Postgres and ran migrations) and the extractor /health. This is
  # the one-command integrated-stack gate; it runs on the GitHub runner's docker daemon since
  # the dev sandbox has none (DECISIONS V-001).
  compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: generate .env (secrets for the compose interpolation)
        run: ./scripts/gen_secrets.sh
      - name: build + start the stack, wait for health
        run: docker compose up -d --build --wait --wait-timeout 300
      - name: smoke-test the seams
        run: |
          set -euo pipefail
          echo "API /readyz:";      curl -fsS http://127.0.0.1:8080/readyz; echo
          echo "API /health:";      curl -fsS http://127.0.0.1:8080/health; echo
          echo "extractor /health:"; curl -fsS http://127.0.0.1:8900/health; echo
      - name: dump logs on failure
        if: failure()
        run: docker compose ps && docker compose logs --no-color
      - name: tear down (remove volumes)
        if: always()
        run: docker compose down -v

  # Dependency advisory scanning (audit: supply-chain). cargo-audit over Cargo.lock + pip-audit
  # over the extractor requirements. Currently non-blocking (continue-on-error) so it surfaces
  # advisories as a visible signal without breaking the pipeline on transitive issues we can't
  # immediately fix; flip to blocking once the advisory backlog is clean. Dependabot
  # (.github/dependabot.yml) opens the update PRs.
  supply-chain:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: cargo audit
        run: |
          cargo install cargo-audit --locked
          # RUSTSEC-2023-0071 (rsa Marvin attack) enters via sqlx-mysql; we use postgres only,
          # so it is not on our compiled path. Remove the ignore if a fixed rsa ships.
          cargo audit --ignore RUSTSEC-2023-0071
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: pip-audit (extractor)
        run: |
          pip install pip-audit
          pip-audit -r services/extractor/requirements.txt
