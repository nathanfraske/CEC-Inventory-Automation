name: ci
on:
  push:
  pull_request:

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        # Fails the build if any secret is committed, including a stray .env.
        # GITHUB_TOKEN is required for gitleaks-action@v2 to scan pull_request events.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  rust:
    runs-on: ubuntu-latest
    env:
      SQLX_OFFLINE: "true"   # build without a live DB; uses the committed .sqlx cache
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo build --workspace
