# CEC Inventory single-box stack. Reads .env (gitignored). Never commit .env.
# Ports bind to 127.0.0.1 only; reach the app over the Headscale mesh, not a public bind.
# See SECRETS-AND-DATABASE.md for the Docker-secrets variant (POSTGRES_PASSWORD_FILE).
#
# The Rust services run inside the compose network, so they reach Postgres at host `db`
# (not the `localhost` DATABASE_URL in .env, which is for host-run dev). Each container
# therefore builds its own DATABASE_URL from the POSTGRES_* parts with host `db`.
name: cec-inventory

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "127.0.0.1:${POSTGRES_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data    # named volume, NOT a repo bind mount
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    # postgres drops to its own user + needs caps in its entrypoint (chown/gosu), so no
    # cap_drop here; no-new-privileges + limits are still safe.
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    pids_limit: 300

  extractor:
    build:
      context: ./services/extractor
      dockerfile: Dockerfile
    environment:
      PYTHONUNBUFFERED: "1"
      # Image vision backend (scope §11.2): 'stub' by default; 'openai' targets an
      # OpenAI-compatible endpoint (the on-box cec-llm-broker / local VLM) and keeps receipt
      # images on-prem; 'claude' is the interim hosted-vision path. Keys are secrets — supplied
      # via the gitignored .env, never baked.
      EXTRACTOR_VLM_BACKEND: ${EXTRACTOR_VLM_BACKEND:-stub}
      EXTRACTOR_VLM_MODEL: ${EXTRACTOR_VLM_MODEL:-}
      EXTRACTOR_VLM_BASE_URL: ${EXTRACTOR_VLM_BASE_URL:-}
      EXTRACTOR_VLM_API_KEY: ${EXTRACTOR_VLM_API_KEY:-}
      EXTRACTOR_VLM_MAX_TOKENS: ${EXTRACTOR_VLM_MAX_TOKENS:-2048}
      EXTRACTOR_VLM_TIMEOUT: ${EXTRACTOR_VLM_TIMEOUT:-600}
      # Refuse receipt images larger than this many bytes before any VLM egress (16 MiB default).
      EXTRACTOR_VLM_MAX_IMAGE_BYTES: ${EXTRACTOR_VLM_MAX_IMAGE_BYTES:-16777216}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
    # Reach a vision model served on the host (e.g. the cec-llm-broker on :8080) from inside the
    # container: host.docker.internal resolves to the host gateway on native Docker + WSL2.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8900:8900"
    healthcheck:
      # python is always present in the image; avoids adding curl to the extractor layer.
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8900/health').status==200 else 1)\""]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Immutable root FS: the extractor writes nothing to disk (it streams to the VLM + returns JSON).
    # A writable /tmp covers any transient need; Python just skips __pycache__ writes harmlessly.
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 1g
    pids_limit: 200

  api:
    build:
      context: .
      dockerfile: crates/api/Dockerfile
    environment:
      # Container reaches Postgres at the `db` service host, not the .env localhost.
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      API_BIND: ${API_BIND}
      SESSION_SECRET: ${SESSION_SECRET}
      RUST_LOG: ${RUST_LOG}
      STORAGE_BACKEND: ${STORAGE_BACKEND}
      STORAGE_FS_ROOT: ${STORAGE_FS_ROOT}
      EXTRACTOR_URL: http://extractor:8900
    depends_on:
      db:
        condition: service_healthy
      extractor:
        condition: service_started
    ports:
      # Host-published port is configurable: on boxes where 8080 is already taken
      # (e.g. the cec-llm-broker), set API_PUBLISH_PORT in .env. Container stays 8080.
      - "127.0.0.1:${API_PUBLISH_PORT:-8080}:8080"
    volumes:
      - objects:/var/lib/cec-inventory/objects
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/readyz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Immutable root FS: the api only writes receipts to the `objects` volume (mounted writable)
    # and logs to stdout. /tmp is a tmpfs for any transient file.
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 512m
    pids_limit: 200

  poller:
    build:
      context: .
      dockerfile: crates/poller/Dockerfile
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      RUST_LOG: ${RUST_LOG}
      CARRIER_PROVIDER: ${CARRIER_PROVIDER}
      CARRIER_API_KEY: ${CARRIER_API_KEY}
      CARRIER_API_SECRET: ${CARRIER_API_SECRET}
      SHIPMENT_POLL_INTERVAL_SECS: ${SHIPMENT_POLL_INTERVAL_SECS}
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    # Immutable root FS: the poller only talks to Postgres + the carrier API; no disk writes.
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 256m
    pids_limit: 200

  # minio:   # enable only when STORAGE_BACKEND=minio
  #   image: minio/minio
  #   command: server /data --console-address ":9001"
  #   environment:
  #     MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
  #     MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
  #   volumes: ["miniodata:/data"]
  #   ports: ["127.0.0.1:9000:9000", "127.0.0.1:9001:9001"]

volumes:
  pgdata:
  objects:
  # miniodata:
